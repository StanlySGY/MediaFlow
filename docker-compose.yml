services:
  audioflow-asr:
    build: .
    image: audioflow-asr:latest
    container_name: audioflow-asr
    restart: unless-stopped
    ports:
      - "8999:8999"
    env_file:
      - .env
    volumes:
      - ./temp:/app/temp
      - ./outputs:/app/outputs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8999/health',timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
