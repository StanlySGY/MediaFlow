# Production / air-gapped deployment — runs a pre-loaded image, never builds.
#
# Workflow (see README "离线现场部署"):
#   build host (online):  ./build.sh --save        → mediaflow-1.4.0-amd64.tar.gz
#   copy the .tar.gz to the air-gapped site
#   site (offline):       docker load -i mediaflow-1.4.0-amd64.tar.gz
#                         cp .env.example .env   # set ASR_BASE_URL to the in-network ASR
#                         docker compose -f docker-compose.prod.yml up -d
#
# No `build:` key on purpose: if the image isn't loaded, compose fails loudly
# ("image not found") instead of silently trying to build offline. The image
# tag is pinned so the running version is traceable across deliveries.
#
# Firewall note: on hosts where bridge port publishing is blocked (RHEL/Rocky
# firewalld, OpenStack/MAAS), drop the `ports:` block and add `network_mode: host`.
services:
  mediaflow:
    image: mediaflow:1.4.0
    container_name: mediaflow
    restart: unless-stopped
    ports:
      - "8999:8999"
    env_file:
      - .env
    volumes:
      - ./temp:/app/temp
      - ./outputs:/app/outputs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8999/health',timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
